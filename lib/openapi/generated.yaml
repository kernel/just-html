          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/docs/{slug}/versions:
    get:
      tags:
        - docs
      summary: List retained version history (newest first)
      operationId: listVersions
      security:
        - bearerApiKey: []
