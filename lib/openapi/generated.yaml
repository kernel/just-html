          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/docs/{slug}/grants:
    get:
      tags:
        - sharing
      summary: List grants (owner only)
      operationId: listGrants
      security:
        - bearerApiKey: []
      parameters:
        - $ref: '#/components/parameters/Slug'
      responses:
        '200':
          description: Grants on the document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantListResponse'
        '401':
          description: Missing/invalid credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: No such document (also returned for inaccessible docs; no existence oracle)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - sharing
      summary: Share with an email or a domain (owner only)
      description: >-
        Provide exactly one of email or domain. role is editor, commenter, or viewer. Consumer email
        providers (gmail.com, ...) are rejected with 422. Re-granting the same target+role is
        idempotent (200 with unchanged:true). Email grants send the grantee a share-notification
        email containing ONE single-use, 7-day login link with next=/d/:slug; set notify:false to
        suppress it. DOMAIN grants NEVER notify (notify is ignored for them).
      operationId: createGrant
      security:
        - bearerApiKey: []
      parameters:
        - $ref: '#/components/parameters/Slug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantBody'
      responses:
        '200':
          description: Idempotent re-grant (same target + role)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantUnchangedResponse'
        '201':
          description: Grant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantCreatedResponse'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Missing/invalid credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: A resource quota was exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: No such document (also returned for inaccessible docs; no existence oracle)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: Consumer email domain rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/docs/{slug}/grants/{id}:
    delete:
      tags:
        - sharing
      summary: Revoke a grant (owner only)
      operationId: deleteGrant
      security:
        - bearerApiKey: []
      parameters:
        - $ref: '#/components/parameters/Slug'
        - $ref: '#/components/parameters/GrantId'
      responses:
        '200':
          description: Grant revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantDeletedResponse'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Missing/invalid credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: No such document (also returned for inaccessible docs; no existence oracle)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/docs/{slug}/comments:
    get:
      tags:
        - collaboration
      summary: List all comment threads (the complete all-threads view)
      description: >-
        Returns every live thread the caller can see, exactly as the viewer shell shows humans:
        anchored threads in document order, then doc-level threads, then orphaned threads, each
        carrying resolved/orphaned flags, 1-level replies, and reactions. Read access required
        (owner/grant via identity, a valid view token, or a public doc).
      operationId: listComments
      security:
        - bearerApiKey: []
        - {}
      parameters:
        - $ref: '#/components/parameters/Slug'
        - schema:
            type: string
            description: >-
              Present a doc's view token to comment/read as a token-holder (with identity). Not
              needed for owner/grantee sessions or API keys.
          required: false
          description: >-
            Present a doc's view token to comment/read as a token-holder (with identity). Not needed
            for owner/grantee sessions or API keys.
          name: viewtoken
          in: query
      responses:
        '200':
          description: All threads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentsListResponse'
        '404':
          description: No such document (also returned for inaccessible docs; no existence oracle)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - collaboration
      summary: Post a comment (anchored to a quote, doc-level, or a reply)
      description: >-
        Comment on a span by QUOTING it (anchor), at the doc level (omit anchor), or reply to a root
        comment (parent_id). Identity required: API key OR signed-in session — anonymous never
        writes. Permission to comment: owner, editor or commenter grant, view-token holder with
        identity, or any identity on a public doc.
      operationId: createComment
      security:
        - bearerApiKey: []
        - {}
      parameters:
        - $ref: '#/components/parameters/Slug'
        - schema:
            type: string
            description: >-
              Present a doc's view token to comment/read as a token-holder (with identity). Not
              needed for owner/grantee sessions or API keys.
          required: false
          description: >-
            Present a doc's view token to comment/read as a token-holder (with identity). Not needed
            for owner/grantee sessions or API keys.
          name: viewtoken
          in: query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentBody'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentCreatedResponse'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Missing/invalid credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Can view but not comment (e.g. a viewer-only grant)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: No such document (also returned for inaccessible docs; no existence oracle)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '413':
          description: Comment body exceeds 10 KB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/docs/{slug}/comments/{id}:
    patch:
      tags:
        - collaboration
      summary: Edit body (author) and/or resolve/unresolve (anyone who can comment)
      operationId: updateComment
      security:
        - bearerApiKey: []
        - {}
      parameters:
        - $ref: '#/components/parameters/Slug'
        - $ref: '#/components/parameters/CommentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentBody'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentUpdatedResponse'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Missing/invalid credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Editing another author's body, or resolving without comment rights
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: No such document (also returned for inaccessible docs; no existence oracle)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - collaboration
      summary: Soft-delete a comment (author own, owner any)
      operationId: deleteComment
      security:
        - bearerApiKey: []
        - {}
      parameters:
        - $ref: '#/components/parameters/Slug'
        - $ref: '#/components/parameters/CommentId'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentDeletedResponse'
        '401':
          description: Missing/invalid credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Not the author and not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: No such document (also returned for inaccessible docs; no existence oracle)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/docs/{slug}/reactions:
    post:
      tags:
        - collaboration
      summary: React to a doc, a comment, or a quoted span (attributed; re-post toggles off)
      description: >-
        Add an emoji reaction. The target is 3-way and MUTUALLY EXCLUSIVE: comment_id set → react on
        that comment; anchor set → react on a text span (W3C text-quote, same shape + validation as
        a comment anchor; an agent "highlights" by quoting); neither set → react on the whole
        document. Supplying BOTH comment_id and anchor → 400. Attributed-only (identity required);
        unique per (target, author, emoji) — for span reactions the "target" is the anchor
        signature, so the same emoji on two different spans are two distinct reactions. Re-posting
        the same reaction removes it (toggle). Anchored reactions re-anchor on every doc edit
        exactly like comments (move, or orphan + later un-orphan); an orphaned anchored reaction
        degrades to doc-level display. React permission: anyone who can view, with identity.
      operationId: addReaction
      security:
        - bearerApiKey: []
        - {}
      parameters:
        - $ref: '#/components/parameters/Slug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReactionBody'
      responses:
        '200':
          description: Reaction toggled off (the same reaction already existed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReactionToggledResponse'
        '201':
          description: Reaction added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReactionCreatedResponse'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Missing/invalid credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: No such document (also returned for inaccessible docs; no existence oracle)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: comment_id does not reference a live comment on this document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/docs/{slug}/reactions/{id}:
    delete:
      tags:
        - collaboration
      summary: Remove your own reaction
      operationId: deleteReaction
      security:
        - bearerApiKey: []
        - {}
      parameters:
        - $ref: '#/components/parameters/Slug'
        - $ref: '#/components/parameters/ReactionId'
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReactionDeletedResponse'
        '401':
          description: Missing/invalid credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: No such document (also returned for inaccessible docs; no existence oracle)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /agent/identity:
    post:
      tags:
        - auth
      summary: Start a service_auth registration
      description: >-
        Creates a pending registration (no user account is created yet), emails the human a 6-digit
        code, and returns a claim_token plus a claim block. There is exactly one flow: justhtml.sh
        emails the login_hint the code (the code and nothing else — no links). The user_code is
        NEVER returned in the response (the email is the binding proof). The human reads the code
        back to the agent, which submits it to POST /agent/identity/claim/complete; the agent then
        polls /oauth2/token for the key. There is no claim_delivery parameter, no approve link, and
        no hosted claim form.
      operationId: startRegistration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartRegistrationBody'
      responses:
        '200':
          description: Pending registration created; code emailed to the human
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartRegistrationResponse'
        '400':
          description: >-
            Bad body, bad login_hint, unsupported type, or a now-removed parameter (claim_delivery
            is rejected with invalid_request).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
        '503':
          description: >-
            email_send_failed — the code email could not be sent; the registration is voided. Retry
            registration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
  /agent/identity/claim:
    post:
      tags:
        - auth
      summary: Re-mint an expired code
      description: >-
        Invalidates the prior code and emails a fresh 6-digit code (the 24h registration window must
        still be open). A corrected email updates the registration's login_hint. The new code is NOT
        returned in the response — it goes to the human's inbox.
      operationId: remintClaim
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemintClaimBody'
      responses:
        '200':
          description: Fresh code emailed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemintClaimResponse'
        '400':
          description: Bad body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
        '401':
          description: Unknown claim_token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
        '409':
          description: Already claimed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
        '410':
          description: Registration window closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
  /agent/identity/claim/complete:
    post:
      tags:
        - auth
      summary: Complete a claim by reading the emailed code back
      description: >-
        The human reads the 6-digit code from the emailed message back to the agent, which submits
        it here to confirm the claim WITHOUT a browser session (the binding proof is that the code
        only reached the human via their inbox). Constant-time compare; 5 wrong attempts kill the
        code (410 code_dead), then re-mint via POST /agent/identity/claim. On success the agent's
        /oauth2/token poll returns the key.
      operationId: completeClaim
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteClaimBody'
      responses:
        '200':
          description: Claim confirmed; poll /oauth2/token for the key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteClaimResponse'
        '400':
          description: Bad body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
        '401':
          description: >-
            invalid_claim_token (unknown token) or invalid_user_code (wrong code; message names
            attempts remaining).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
        '409':
          description: claimed_or_in_flight (already claimed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
        '410':
          description: >-
            claim_expired (registration window closed), code_dead (5 wrong attempts), or
            expired_token (user_code window closed). Re-mint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentError'
  /oauth2/token:
    post:
      tags:
        - auth
      summary: Poll the claim grant for the API key
      description: >-
        RFC 8628-style polling. While the human has not finished, returns 400 authorization_pending
        (or slow_down if polled under 5s apart). On confirm, returns the long-lived API key exactly
        once.
      operationId: claimGrantToken
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenForm'
      responses:
        '200':
          description: Credential issued (once)
          headers:
            Cache-Control:
              schema:
                type: string
              description: no-store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: >-
            OAuth error envelope. error one of: authorization_pending, slow_down, expired_token,
            invalid_grant, invalid_request, unsupported_grant_type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
  /oauth2/revoke:
    post:
      tags:
        - auth
      summary: Revoke an API key (RFC 7009)
      description: Idempotent. Returns 200 with an empty body whether or not the token existed.
      operationId: revokeToken
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RevokeForm'
      responses:
        '200':
          description: Revoked (or no-op); empty body
        '400':
          description: Malformed body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
  /.well-known/oauth-protected-resource:
    get:
      tags:
        - discovery
      summary: RFC 9728 protected-resource metadata
      operationId: protectedResourceMetadata
      security: []
      responses:
        '200':
          description: Resource metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtectedResourceMetadata'
  /.well-known/oauth-authorization-server:
    get:
      tags:
        - discovery
      summary: RFC 8414 authorization-server metadata (with agent_auth block)
      operationId: authServerMetadata
      security: []
      responses:
        '200':
          description: Authorization-server metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthServerMetadata'
webhooks: {}
