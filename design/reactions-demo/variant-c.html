<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>C — superscript footnote badge — justhtml.sh reactions</title>
<!--
  VARIANT C — SUPERSCRIPT FOOTNOTE BADGE
    Treats reactions like footnotes. The reacted span gets a faint underline; at
    its END sits a single tiny SUPERSCRIPT marker showing the dominant emoji and,
    if there are several, a small total (e.g. ⁵). The marker is light and
    typographic — it reads like a citation, not a button. Hover the marker → a
    footnote-style popover lists every emoji with its reactor gravatars + emails
    and counts, and offers a "+ react" affordance. Click your own emoji in the
    popover → toggles off.

  Rationale: keeps the document almost pristine (one superscript glyph per span,
  no inline chips bloating the line height) while still anchoring the reaction
  visually to the exact words. Good when reactions are dense or the doc is prose-heavy.

  OVERLAP CASE: the comment highlight (solid yellow) and the reaction superscript
  coexist cleanly — the superscript rides just past the yellow run, so you see
  "highlighted words^❤³". Two orthogonal signals, neither fights the other.

  Doc-level reactions: de-emphasized strip in the rail header.
-->
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:ui-monospace,"SF Mono",Menlo,Consolas,"Courier New",monospace;color:#111;background:#fff}
  .jh-bar{display:flex;justify-content:space-between;align-items:center;height:2.4rem;padding:0 0.9rem;font-size:13px;border-bottom:1px solid #ccc;background:#fafafa}
  .jh-bar .jh-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
  .jh-bar a{color:#0000ee}.jh-bar .jh-credit{flex-shrink:0;padding-left:.9rem}

  .stage{position:relative;height:calc(100vh - 2.4rem);overflow:auto;background:#fff;display:flex}
  .docwrap{flex:1;min-width:0;position:relative}
  .doc{max-width:42rem;margin:0 auto;padding:2.2rem 1.2rem 8rem;font-family:Georgia,"Times New Roman",serif;font-size:16px;line-height:1.7;color:#1a1a1a}
  .doc h1{font-size:1.5rem;margin:.2rem 0 1rem}
  .doc h2{font-size:1.1rem;margin:2rem 0 .5rem;font-family:ui-monospace,monospace;color:#333}
  .doc p{margin:.8rem 0}
  .doc pre{font-family:ui-monospace,monospace;font-size:13px;background:#f6f6f6;border:1px solid #e3e3e3;border-radius:4px;padding:.8rem;overflow:auto;line-height:1.45}
  .doc ul{margin:.6rem 0;padding-left:1.4rem}
  .doc code{font-family:ui-monospace,monospace;font-size:.9em;background:#f0f0f0;padding:0 3px;border-radius:3px}

  .hl{background:#fff3bf;cursor:pointer;border-bottom:1px solid #f1d96b}
  .hl.active{background:#ffe089}
  .rx-anchor{border-bottom:1px dotted #c2cfdd}
  .rx-anchor.active{border-bottom-color:#7f9fc4}

  /* the superscript footnote marker */
  .rx-sup{font-size:.62em;vertical-align:.45em;margin-left:1px;cursor:pointer;
    font-family:ui-monospace,monospace;color:#5c6b7d;user-select:none;
    padding:0 1px;border-radius:3px;transition:background .1s,color .1s;line-height:1}
  .rx-sup:hover,.rx-sup.open{background:#eef3fb;color:#2f4a72}
  .rx-sup .em{font-size:1.15em}
  .rx-sup .tot{font-feature-settings:"sups";margin-left:1px}

  .rail{width:300px;flex-shrink:0;border-left:1px solid #e2e2e2;background:#fbfbfb;position:relative}
  .rail-hd{position:sticky;top:0;background:#fbfbfb;border-bottom:1px solid #eee;padding:6px 10px;font-size:11px;color:#666;display:flex;justify-content:space-between;align-items:center;z-index:5}
  .doclevel{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:5px 10px;border-bottom:1px solid #eee;background:#fbfbfb}
  .doclevel .lbl{color:#aaa;font-size:10px;margin-right:2px}
  .doclevel .dchip{font-size:10.5px;border:1px solid #ececec;border-radius:9px;padding:0 5px;background:#fcfcfc;color:#888;cursor:pointer}
  .doclevel .dchip.mine{border-color:#cdd9ea;color:#3a5b8a;background:#f3f7fc}
  .cards{position:relative;padding:6px 8px 200px}
  .card{background:#fff;border:1px solid #e2e2e2;border-radius:7px;margin-bottom:7px;font-size:12px;cursor:pointer;overflow:hidden}
  .card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
  .card.active{border-color:#f1c40f;box-shadow:0 2px 10px rgba(0,0,0,.13)}
  .card .top{display:flex;gap:7px;padding:8px 9px}
  .card img{width:24px;height:24px;border-radius:50%;flex-shrink:0}
  .card .who{font-weight:700;color:#222}.card .when{color:#999;font-size:10.5px}
  .card .body{color:#222;margin-top:2px;font-family:Georgia,serif;font-size:13px;line-height:1.45}

  .seltool{position:absolute;display:none;flex-direction:column;gap:2px;background:#111;border-radius:7px;padding:4px;box-shadow:0 4px 14px rgba(0,0,0,.3);z-index:30}
  .seltool button{width:30px;height:30px;border:none;background:transparent;color:#fff;font-size:15px;cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center}
  .seltool button:hover{background:#333}
  .emojibar{position:absolute;display:none;background:#fff;border:1px solid #ccc;border-radius:18px;padding:3px 6px;box-shadow:0 4px 14px rgba(0,0,0,.2);z-index:31;gap:2px}
  .emojibar button{border:none;background:transparent;font-size:17px;cursor:pointer;padding:2px 4px;border-radius:50%}
  .emojibar button:hover{background:#f0f0f0}

  /* footnote popover */
  .fnpop{position:fixed;display:none;background:#fff;border:1px solid #ccc;border-radius:7px;box-shadow:0 6px 20px rgba(0,0,0,.16);z-index:40;padding:7px 9px;font-size:11.5px;min-width:170px;max-width:250px}
  .fnpop .hdr{color:#888;font-size:10px;margin-bottom:5px;border-bottom:1px solid #f0f0f0;padding-bottom:4px}
  .fnpop .erow{display:flex;align-items:flex-start;gap:6px;padding:3px 0}
  .fnpop .erow .e{font-size:15px;width:18px;flex-shrink:0}
  .fnpop .erow .who{display:flex;flex-direction:column;gap:2px}
  .fnpop .erow .person{display:flex;align-items:center;gap:5px;color:#333;cursor:pointer}
  .fnpop .erow .person img{width:16px;height:16px;border-radius:50%}
  .fnpop .erow .person.mine{color:#3a5b8a}
  .fnpop .erow .person.mine:hover{text-decoration:line-through;color:#b04a4a}
  .fnpop .addrow{margin-top:6px;border-top:1px solid #f0f0f0;padding-top:5px;display:flex;gap:3px;flex-wrap:wrap}
  .fnpop .addrow button{border:none;background:#f6f6f6;border-radius:7px;font-size:14px;cursor:pointer;padding:2px 5px}
  .fnpop .addrow button:hover{background:#e8eef8}

  .legend{position:fixed;bottom:8px;left:8px;font-size:10px;color:#aaa;background:#fff;border:1px solid #eee;border-radius:4px;padding:3px 7px;max-width:46%}
</style>
</head>
<body>
<div class="jh-bar">
  <span class="jh-title">RECTL(1) — record-control utility — design spec</span>
  <span class="jh-credit">made with <a href="#">justhtml.sh</a></span>
</div>
<div class="stage" id="stage">
  <div class="docwrap" id="docwrap">
    <article class="doc" id="doc"></article>
    <div class="seltool" id="seltool">
      <button title="add comment" data-act="comment">💬</button>
      <button title="add reaction" data-act="react">😊</button>
    </div>
    <div class="emojibar" id="emojibar"></div>
  </div>
  <aside class="rail" id="rail">
    <div class="rail-hd"><span id="railCount">comments</span></div>
    <div class="doclevel" id="doclevel"></div>
    <div class="cards" id="cards"></div>
  </aside>
</div>
<div class="fnpop" id="fnpop"></div>
<div class="legend">C — superscript footnote badge. One tiny marker per reacted span; hover for the footnote (who + counts). Select text → 😊.</div>

<script src="shared.js"></script>
<script>
/* ============ VARIANT C render: superscript footnote markers ============ */
const SUPS={1:"¹",2:"²",3:"³",4:"⁴",5:"⁵",6:"⁶",7:"⁷",8:"⁸",9:"⁹"};
renderDoc();
applyComments();
applyReactionAnchors();
renderRail();
renderDocLevel();
wireSelectionToolbar({ onReact(emoji){ addAnchoredReaction(emoji); } });

let openSig=null;
function applyReactionAnchors(){
  doc.querySelectorAll(".rx-anchor").forEach(unwrap);
  doc.querySelectorAll(".rx-sup").forEach(n=>n.remove());
  doc.normalize();
  groupAnchored().forEach(g=>{
    const r=findTextRange(g.anchor);if(!r)return;
    try{
      const span=document.createElement("span");span.className="rx-anchor";span.dataset.sig=g.sig;
      span.appendChild(r.extractContents());r.insertNode(span);doc.normalize();
      // dominant emoji = most-reacted
      const ranked=Object.entries(g.byEmoji).sort((a,b)=>b[1].length-a[1].length);
      const dom=ranked[0][0];
      const sup=document.createElement("sup");sup.className="rx-sup";sup.dataset.sig=g.sig;
      sup.innerHTML=`<span class="em">${dom}</span>`+(g.count>1?`<span class="tot">${SUPS[g.count]||("·"+g.count)}</span>`:"");
      sup.title=g.count+" reaction"+(g.count!==1?"s":"");
      sup.addEventListener("mouseenter",()=>showFootnote(sup,g));
      sup.addEventListener("click",e=>{e.stopPropagation();showFootnote(sup,g,true);});
      span.after(sup);
    }catch(e){}
  });
}
function showFootnote(supEl, g, pin){
  const pop=document.getElementById("fnpop");
  openSig=g.sig;
  document.querySelectorAll(".rx-sup").forEach(s=>s.classList.toggle("open",s.dataset.sig===g.sig));
  const ranked=Object.entries(g.byEmoji).sort((a,b)=>b[1].length-a[1].length);
  pop.innerHTML=`<div class="hdr">reactions on this span</div>`+
    ranked.map(([e,as])=>`<div class="erow"><span class="e">${e}</span><div class="who">`+
      as.map(a=>`<span class="person${a===ME?' mine':''}" data-emoji="${e}" data-toggle="${a===ME?1:0}"><img src="${av(a,32)}">${a}${a===ME?' (you — click to remove)':''}</span>`).join("")+
      `</div></div>`).join("")+
    `<div class="addrow">`+EMOJIS.map(e=>`<button data-add="${e}">${e}</button>`).join("")+`</div>`;
  const r=supEl.getBoundingClientRect();
  pop.style.display="block";
  pop.style.left=Math.min(r.left, window.innerWidth-260)+"px";
  pop.style.top=(r.bottom+6)+"px";
  // wire toggles + add
  pop.querySelectorAll('.person[data-toggle="1"]').forEach(p=>p.addEventListener("click",ev=>{ev.stopPropagation();toggleReaction(g.anchor,p.dataset.emoji);refresh();hideFootnote();}));
  pop.querySelectorAll('[data-add]').forEach(b=>b.addEventListener("click",ev=>{ev.stopPropagation();toggleReaction(g.anchor,b.dataset.add);refresh();hideFootnote();}));
  pop._pin=pin;
}
function hideFootnote(){const pop=document.getElementById("fnpop");pop.style.display="none";openSig=null;document.querySelectorAll(".rx-sup").forEach(s=>s.classList.remove("open"));}
/* hover-out closes unless pinned by click; clicking elsewhere closes */
document.getElementById("fnpop").addEventListener("mouseleave",e=>{const p=document.getElementById("fnpop");if(!p._pin)hideFootnote();});
document.addEventListener("mousemove",e=>{const p=document.getElementById("fnpop");
  if(p.style.display==="block"&&!p._pin&&!e.target.closest(".rx-sup")&&!e.target.closest(".fnpop"))hideFootnote();});
document.addEventListener("mousedown",e=>{const p=document.getElementById("fnpop");if(p._pin&&!e.target.closest(".fnpop")&&!e.target.closest(".rx-sup"))hideFootnote();});

function refresh(){doc.querySelectorAll(".hl").forEach(unwrap);doc.normalize();applyComments();applyReactionAnchors();renderRail();renderDocLevel();}
afterAnchoredReactionAdded=refresh;
</script>
</body>
</html>
